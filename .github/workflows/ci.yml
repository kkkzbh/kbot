name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Typecheck + Test + Build + Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Task automation regression tests
        run: pnpm test -- tests/task-automation-llm.test.ts

      - name: Task automation context regression tests
        run: pnpm test -- tests/qbot-context-scenarios.test.ts tests/task-automation.test.ts

      - name: Build
        run: pnpm build

      - name: Koishi startup smoke test
        env:
          ONEBOT_SELF_ID: "100000001"
          OPENAI_API_KEY: "sk-ci-smoke"
          OPENAI_MODEL: "deepseek/deepseek-chat"
          TASK_AUTOMATION_INTENT_ENABLED: "false"
          POKEMON_BATTLE_ENABLED: "false"
        run: pnpm smoke:start

      - name: Koishi startup smoke test (delivery model config)
        env:
          ONEBOT_SELF_ID: "100000001"
          OPENAI_API_KEY: "sk-ci-smoke"
          OPENAI_MODEL: "deepseek/deepseek-chat"
          TASK_AUTOMATION_INTENT_ENABLED: "false"
          POKEMON_BATTLE_ENABLED: "false"
          TASK_AUTOMATION_DELIVERY_MODEL: "deepseek-reasoner"
          TASK_AUTOMATION_CHAT_REPLY_MODEL: "deepseek-reasoner"
          TASK_AUTOMATION_DELIVERY_TIMEOUT_MS: "18000"
          TASK_AUTOMATION_CHAT_REPLY_TIMEOUT_MS: "12000"
        run: pnpm smoke:start
