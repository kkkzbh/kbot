plugins:
  group:entry:
    http:main: {}
    adapter-onebot:onebot:
      protocol: ws
      selfId: ${{ env.ONEBOT_SELF_ID }}
      token: ${{ env.ONEBOT_TOKEN || '' }}
      endpoint: ${{ env.ONEBOT_WS_ENDPOINT || 'ws://127.0.0.1:3001' }}
    server:0b8t2q:
      host: ${{ env.KOISHI_HOST || '0.0.0.0' }}
      port: ${{ +env.KOISHI_PORT || 5140 }}
    database-sqlite:8jr5yp:
      path: ${{ env.SQLITE_PATH || './data/koishi.db' }}
    chatluna:0qm1bk:
      botNames:
        - 小祥
      defaultPreset: sakiko
      defaultModel: ${{ env.OPENAI_MODEL || 'deepseek/deepseek-chat' }}
    chatluna-deepseek-adapter:0o3zho:
      apiKeys:
        - - ${{ env.OPENAI_API_KEY || '' }}
          - ${{ env.OPENAI_BASE_URL || 'https://api.deepseek.com/v1' }}
          - true
    ./dist/plugins/chatluna-model-guard: {}
    commands:qp6oxu:
      chatluna:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
      chatluna.room:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
      chatluna.model:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
      chatluna.preset:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
      chatluna.memory:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
      chatluna.embeddings:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
      chatluna.vectorstore:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
      chatluna.tool:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
      chatluna.mcp:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
      chatluna.auth:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
      chatluna.balance:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
