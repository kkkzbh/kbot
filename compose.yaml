name: qqbot-stack

services:
  ollama:
    image: ${OLLAMA_IMAGE:-docker.io/ollama/ollama}:${OLLAMA_TAG:-latest}
    container_name: ollama
    entrypoint:
      - /bin/sh
      - /usr/local/bin/ollama-startup.sh
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text:latest}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./docker/ollama-startup.sh:/usr/local/bin/ollama-startup.sh:ro,Z
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "OLLAMA_HOST=http://127.0.0.1:11434 ollama list >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  pmhq:
    image: ${PMHQ_IMAGE:-docker.io/linyuchen/pmhq}:${PMHQ_TAG:-latest}
    container_name: pmhq
    privileged: true
    environment:
      ENABLE_HEADLESS: ${ENABLE_HEADLESS:-false}
      AUTO_LOGIN_QQ: ${AUTO_LOGIN_QQ:-}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - qq_volume:/root/.config/QQ
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  llbot:
    image: ${LLBOT_IMAGE:-docker.io/linyuchen/llbot}:${LLBOT_TAG:-latest}
    container_name: llonebot
    environment:
      PMHQ_HOST: pmhq
      WEBUI_PORT: ${LLONEBOT_WEBUI_PORT:-3080}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${LLONEBOT_WEBUI_PORT:-3080}:${LLONEBOT_WEBUI_PORT:-3080}"
      - "${LLONEBOT_WS_PORT:-3001}:3001"
    volumes:
      - qq_volume:/root/.config/QQ
      - ./data/llonebot:/app/llbot/data:Z
    networks:
      - app_network
    depends_on:
      - pmhq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "ps | grep '[n]ode'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  qq_volume:
  ollama_data:

networks:
  app_network:
    driver: bridge
